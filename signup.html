<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - BS BINMAP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <h2>Sign Up</h2>
            <form class="auth-form" id="signupForm">
                <div class="auth-field">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="auth-input" placeholder="Your name" required>
                </div>
                <div class="auth-field">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="auth-input" placeholder="example@email.com" required>
                </div>
                <div class="auth-field">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="auth-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-auth-submit">Sign Up</button>
            </form>
            <div class="auth-footer">
                Already have an account? <a href="login.html">Log In</a>
            </div>
            <div class="auth-divider">or</div>
            <button class="btn-google">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" height="18" alt="Google">
                Sign up with Google
            </button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://oxmbkykllivbwgfwqctb.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_GQ7oPb-T9han1h1I8Bs6Fg_VQaFLaNd';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // 1. Sign up the user in Supabase Auth
            const { data, error: authError } = await supabaseClient.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        full_name: name,
                    },
                },
            });

            if (authError) {
                alert('Sign up failed: ' + authError.message);
                return;
            }

            // 2. Create a profile in the 'profiles' table
            if (data.user) {
                const { error: profileError } = await supabaseClient
                    .from('profiles')
                    .insert([
                        { id: data.user.id, full_name: name },
                    ]);

                if (profileError) {
                    console.error('Error creating profile:', profileError.message);
                    // We still count it as success for auth, but log the profile error
                }
            }

            alert('สมัครสมาชิกสำเร็จ! สามารถเข้าสู่ระบบได้เลยครับ');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
