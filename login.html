<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - BS BINMAP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <h2>Log In</h2>
            <form class="auth-form" id="loginForm">
                <div class="auth-field">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="auth-input" placeholder="example@email.com" required>
                </div>
                <div class="auth-field">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="auth-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-auth-submit">Log In</button>
            </form>
            <div class="auth-footer">
                Don't have an account? <a href="signup.html">Sign Up</a>
            </div>
            <div class="auth-divider">or</div>
            <button class="btn-google">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" height="18" alt="Google">
                Sign in with Google
            </button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://oxmbkykllivbwgfwqctb.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_GQ7oPb-T9han1h1I8Bs6Fg_VQaFLaNd';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                alert('Login failed: ' + error.message);
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
